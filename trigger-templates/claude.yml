name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-adhoc-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  run:
    uses: etrubenok/claude-workflows/.github/workflows/claude.yml@v1
    with:
      event_name: ${{ github.event_name }}
      # runner: '["ubuntu-latest"]'  # uncomment to override default
    secrets: inherit
