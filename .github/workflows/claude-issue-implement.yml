name: Claude Issue Implement

on:
  workflow_call:
    inputs:
      event_name:
        description: "Original github.event_name from caller"
        required: true
        type: string
      runner:
        description: "Runner label (JSON array string)"
        required: false
        type: string
        default: '["self-hosted", "linux", "claude-agent"]'

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ─── Stage 1: Implement from issue comment ─────────────────────────────
  implement:
    if: |
      contains(github.event.comment.body, '@implement') &&
      !contains(github.event.comment.body, '@research') &&
      github.actor != 'github-actions[bot]' &&
      !github.event.issue.pull_request
    runs-on: ${{ fromJSON(inputs.runner) }}
    timeout-minutes: 90
    outputs:
      pr_number: ${{ steps.find-pr.outputs.pr_number }}
    steps:
      - name: Validate PAT_WORKFLOWS
        run: |
          if [ -z "${{ secrets.PAT_WORKFLOWS }}" ]; then
            echo "::error::PAT_WORKFLOWS secret is required but not configured. See README setup instructions."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_WORKFLOWS }}

      - name: Set working label on issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for label in "🤖 claude-working" "✅ claude-done" "❌ claude-failed" "⚠️ claude-cancelled"; do
            ENCODED=$(printf '%s' "$label" | jq -sRr @uri)
            gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels/${ENCODED}" --method DELETE 2>/dev/null || true
          done
          gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/labels" --method POST -f "labels[]=🤖 claude-working"

      - name: Fetch issue content
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_JSON=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}")
          COMMENTS_JSON=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" --jq '[.[].body]')
          echo "$ISSUE_JSON" | jq --argjson comments "$COMMENTS_JSON" '{title: .title, body: .body, comments: $comments}' > /tmp/issue-content.json

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          show_full_output: true
          branch_prefix: "feature/"
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.PAT_WORKFLOWS }}
          claude_args: "--max-turns 80 --dangerously-skip-permissions"
          prompt: |
            You are implementing code from a GitHub issue based on a user's comment.
            Read CLAUDE.md to see how to access GitHub and environments.

            ## Issue Context

            Read the full issue content from /tmp/issue-content.json.
            This is issue #${{ github.event.issue.number }}.

            ## User's Instruction

            The user commented:
            ${{ github.event.comment.body }}

            ## What to do

            Focus on implementing EXACTLY what the user's comment requests.
            If the comment asks for a specific item or subset of the issue spec, implement only that part.
            If the comment asks for the full issue, implement everything.

            Follow the Implementation Workflow in CLAUDE.md.

            IMPORTANT: Do NOT create a new branch — you are already on the correct feature branch.
            Skip the "Create a feature branch" step in CLAUDE.md's Implementation Workflow.
            Work on the current branch, commit, push, and create a PR from it.

            CRITICAL: After implementing and testing, you MUST create a PR:
            1. Stage and commit all changes to the current branch
            2. Push the branch: git push -u origin HEAD
            3. Create the PR:
               - If your implementation covers the FULL issue spec, use: `Closes #${{ github.event.issue.number }}`
               - If your implementation covers only PART of the issue, use: `Part of #${{ github.event.issue.number }}`
               - Example: gh pr create --title "feat: <short description>" --body "Closes #${{ github.event.issue.number }}\n\n<summary of changes>"
            Do NOT skip PR creation — downstream workflow stages depend on it.

            ## E2E SERVICE TESTING (after creating the PR)

            After implementation is complete, the PR is created, and quality checks pass, you MUST run
            end-to-end service tests if CLAUDE.md describes e2e or integration testing procedures.

            STEP A: Re-read the design spec in issue #${{ github.event.issue.number }}.
            Look for explicit testing instructions — which services to run, what data to verify,
            what queries to execute. The spec is authoritative for what to test.

            STEP B: Infer additional checks from context.
            Based on the code changes, identify which services are affected and what downstream
            data flows should be validated.

            STEP C: Build and deploy the service(s) under test.
            Set environment variables as specified in CLAUDE.md before running any deployment commands.
            Follow the service build/deploy/test procedures described in CLAUDE.md.

            STEP D: Post test results as a PR comment.
            Use `gh pr comment` to post results with this marker on the first line:
            <!-- e2e-test-after-implement -->
            Include: services tested, commands run, log excerpts (key lines only), data verification
            results, and overall PASS/FAIL status.

            STEP E: If tests reveal issues, fix the code, rebuild, retest, and update the PR.
            Commit fixes, push, and update the e2e test comment with the new results.

      - name: Find created PR
        id: find-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          # Search by branch name pattern feature/issue-{N}-*
          PR_JSON=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=100" --jq '[.[] | {number: .number, headRefName: .head.ref}]')
          PR_NUMBER=$(echo "$PR_JSON" | jq -r \
            --arg prefix "feature/issue-${ISSUE_NUMBER}-" \
            '[.[] | select(.headRefName | startswith($prefix))] | .[0].number // empty')
          # Fallback: exact branch match feature/issue-{N}
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r \
              --arg exact "feature/issue-${ISSUE_NUMBER}" \
              '[.[] | select(.headRefName == $exact)] | .[0].number // empty')
          fi
          # Fallback: search claude/ prefix branches (claude-code-action default)
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(echo "$PR_JSON" | jq -r \
              --arg prefix "claude/issue-${ISSUE_NUMBER}-" \
              '[.[] | select(.headRefName | startswith($prefix))] | .[0].number // empty')
          fi
          # Fallback: search PR body for issue reference
          if [ -z "$PR_NUMBER" ]; then
            PR_NUMBER=$(gh api "repos/${{ github.repository }}/pulls?state=open&per_page=100" --jq '[.[] | {number: .number, body: .body}]' \
              | jq -r --arg pat "#${ISSUE_NUMBER}\\b" \
              '[.[] | select(.body | test($pat))] | .[0].number // empty')
          fi
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::Could not find PR for issue #${ISSUE_NUMBER}"
            exit 1
          fi
          echo "pr_number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          echo "Resolved PR: #${PR_NUMBER} for issue #${ISSUE_NUMBER}"

      - name: Set working label on PR
        if: steps.find-pr.outputs.pr_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.find-pr.outputs.pr_number }}"
          for label in "🤖 claude-working" "✅ claude-done" "❌ claude-failed" "⚠️ claude-cancelled"; do
            ENCODED=$(printf '%s' "$label" | jq -sRr @uri)
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/${ENCODED}" --method DELETE 2>/dev/null || true
          done
          gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" --method POST -f "labels[]=🤖 claude-working"

  # ─── Review-Fix Loop ───────────────────────────────────────────────────
  review-1:
    needs: [implement]
    if: always() && needs.implement.result == 'success' && needs.implement.outputs.pr_number != ''
    uses: ./.github/workflows/claude-review-iteration.yml
    with:
      iteration: "1"
      pr_number: ${{ needs.implement.outputs.pr_number }}
      is_final: false
      has_prior_reviews: false
      repo: ${{ github.repository }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  fix-1:
    needs: [implement, review-1]
    if: always() && needs.review-1.result == 'success' && needs.review-1.outputs.needs_fix == 'true'
    uses: ./.github/workflows/claude-fix-iteration.yml
    with:
      iteration: "1"
      pr_number: ${{ needs.implement.outputs.pr_number }}
      repo: ${{ github.repository }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  review-2:
    needs: [implement, fix-1]
    if: always() && needs.fix-1.result == 'success'
    uses: ./.github/workflows/claude-review-iteration.yml
    with:
      iteration: "2"
      pr_number: ${{ needs.implement.outputs.pr_number }}
      is_final: false
      has_prior_reviews: true
      repo: ${{ github.repository }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  fix-2:
    needs: [implement, review-2]
    if: always() && needs.review-2.result == 'success' && needs.review-2.outputs.needs_fix == 'true'
    uses: ./.github/workflows/claude-fix-iteration.yml
    with:
      iteration: "2"
      pr_number: ${{ needs.implement.outputs.pr_number }}
      repo: ${{ github.repository }}
      include_failure_context: true
      runner: ${{ inputs.runner }}
    secrets: inherit

  review-3:
    needs: [implement, fix-2]
    if: always() && needs.fix-2.result == 'success'
    uses: ./.github/workflows/claude-review-iteration.yml
    with:
      iteration: "3"
      pr_number: ${{ needs.implement.outputs.pr_number }}
      is_final: true
      has_prior_reviews: true
      repo: ${{ github.repository }}
      runner: ${{ inputs.runner }}
    secrets: inherit

  # ─── Final: Set outcome labels ──────────────────────────────────────────
  final-status:
    needs: [implement, review-1, fix-1, review-2, fix-2, review-3]
    if: always() && needs.implement.result != 'skipped'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Set outcome labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CANCELLED="false"
          FAILED="false"
          for result in \
            "${{ needs.implement.result }}" \
            "${{ needs.review-1.result }}" \
            "${{ needs.fix-1.result }}" \
            "${{ needs.review-2.result }}" \
            "${{ needs.fix-2.result }}" \
            "${{ needs.review-3.result }}"; do
            case "$result" in
              cancelled) CANCELLED="true" ;;
              failure) FAILED="true" ;;
            esac
          done

          if [ "$CANCELLED" = "true" ]; then
            LABEL="⚠️ claude-cancelled"
          elif [ "$FAILED" = "true" ]; then
            LABEL="❌ claude-failed"
          else
            LABEL="✅ claude-done"
          fi

          # Set label on PR (if found)
          PR_NUMBER="${{ needs.implement.outputs.pr_number }}"
          if [ -n "$PR_NUMBER" ]; then
            for l in "🤖 claude-working" "✅ claude-done" "❌ claude-failed" "⚠️ claude-cancelled"; do
              ENCODED=$(printf '%s' "$l" | jq -sRr @uri)
              gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels/${ENCODED}" --method DELETE 2>/dev/null || true
            done
            gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/labels" --method POST -f "labels[]=$LABEL"
          fi

          # Set label on issue
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          if [ -n "$ISSUE_NUMBER" ]; then
            for l in "🤖 claude-working" "✅ claude-done" "❌ claude-failed" "⚠️ claude-cancelled"; do
              ENCODED=$(printf '%s' "$l" | jq -sRr @uri)
              gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/labels/${ENCODED}" --method DELETE 2>/dev/null || true
            done
            gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/labels" --method POST -f "labels[]=$LABEL"
          fi
